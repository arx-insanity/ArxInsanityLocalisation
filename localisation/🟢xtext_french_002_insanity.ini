// Character creation

[insanity_button_normal_start]
string="Points d'attributs de départ"

[insanity_desc_normal_start]
string="Points d'attributs de départ activé. Vous pouvez désormais commencer la partie sans créer de build de personnage précis. Attribuez uniquement les points que vous souhaitez, ou pas du tout. Tous les points non utilisés pourront être répartis plus tards."

[insanity_button_hardcore_start]
string="Pas de points d'attributs de départ"

[insanity_desc_hardcore_start]
string="Points de départ désactivés. Aucun points ne peut être attribué en début de partie, car ils seront réinitialisés. Ensuite, la progression continue normalement, et les points d’attributs et de compétences sont gagnés lors des montées de niveau."

[insanity_suffix_immersive_mode_on]
string=" : Activé"

[insanity_suffix_immersive_mode_off]
string=" : Desactivé"

[insanity_button_immersive_mode] //immersive mode button
string="Mode Immersif (ATH Minimal)"

[insanity_desc_immersive_mode]
string="Les éléments minimalistes de l’ATH offrent un écran plus simplifié et une expérience plus immersive. Seules les icônes essentielles restent visibles, comme l’inventaire, les livres et les icônes de transition de niveau. Le mode immersif peut être activé ou désactivé à tout moment dans le menu des options (Paramètres du jeu)."

