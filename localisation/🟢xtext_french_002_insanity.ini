//ARX INSANITY FRENCH 0.6.0

Translation by DjDeathrow the Vilnoné

//May 2026 update: All main menu descriptions have been capitalized in order to match Arx Insanity's new visual style and interface.

[insanity_choose_difficulty]
string="Selection du niveau de difficulté:"

[insanity_button_difficulty_easy]
string="Facile"

[insanity_desc_difficulty_easy]
string="Une expérience de jeu plus accessible aux débutants. Les attributs et les dégâts des ennemis sont réduits. La régénération de santé est activée et les potions/objets sont bien plus efficaces."

[insanity_button_difficulty_normal]
string="Normal"

[insanity_desc_difficulty_normal]
string="Une expérience de jeu plus équilibrée pour la plupart des joueurs. Les ennemis infligent des dégâts normaux, sont vigilants et possèdent des attributs équilibrés. La régénération de santé est désactivée, davantage d’ennemis apparaissent, et les potions/objets conservent leur efficacité habituelle."

[insanity_button_difficulty_hard]
string="Difficile"

[insanity_desc_difficulty_hard]
string="Défi accru pour les joueurs expérimentés. Les ennemis infligent davantage de dégâts, sont plus vigilants et possèdent des attributs améliorés. La régénération de santé est désactivée, davantage d’ennemis apparaissent et les potions/objets sont moins efficaces."

[insanity_button_difficulty_very_hard]
string="Très difficile"

[insanity_desc_difficulty_very_hard]
string="Reservé aux joueurs vétérans. Les ennemis infligent des dégâts fortement augmentés, sont encore plus vigilants et possèdent des attributs fortement accrus. La régénération de santé est désactivée, encore plus d’ennemis apparaissent et les potions/objets sont bien moins efficaces"

[insanity_button_difficulty_insanity]
string="Insanity"

[insanity_desc_difficulty_insanity]
string="Une expérience brutale pour les joueurs hardcore. Les ennemis infligent des dégâts extrêmes, possèdent une vigilance accrue et des attributs fortement augmentés. La régénération de santé est désactivée, les ennemis sont très nombreux et les potions/objets sont clairement moins efficaces."

[insanity_button_difficulty_nightmare] //secret difficulty
string="Cauchemardesque"

[insanity_desc_difficulty_nightmare]
string="Survivre devient essentiel, Et le monde lui-même devient un cauchemar. Les ennemis infligent des dégâts mortels, possèdent une vigilance accrue, se déplacent plus rapidement et ont des attributs démesurés. La régénération de santé est désactivée, le nombre d’ennemis est écrasant et les potions/objets sont extrêmement moins efficaces."

