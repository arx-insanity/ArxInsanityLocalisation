//ARX INSANITY GERMAN 0.6.0

//Translation by fredlllll

//May 2026 update: All main menu descriptions have been capitalized in order to match Arx Insanity's new visual style and interface.

[insanity_choose_difficulty]
string="Schwierigkeitsstufe wählen:"

[insanity_button_difficulty_easy]
string="Leicht"

[insanity_desc_difficulty_easy]
string="Ein entspanntes Erlebnis für neue Spieler. Der Schaden und die Attribute der Gegner sind reduziert. Gesundheit regeneriert sich und Tränke sowie Gegenstände sind äußerst wirksam."

[insanity_button_difficulty_normal]
string="Normal"

[insanity_desc_difficulty_normal]
string="Ein ausgewogenes Erlebnis für die meisten Spieler. Gegner verursachen normalen Schaden, sind aufmerksam und verfügen über ausgewogene Attribute. Gesundheit regeneriert sich nicht, es erscheinen mehr Gegner, und Tränke sowie Gegenstände sind normal wirksam."

[insanity_button_difficulty_hard]
string="Schwer"

[insanity_desc_difficulty_hard]
string="Eine Herausforderung für erfahrene Spieler. Gegner verursachen erhöhten Schaden, sind aufmerksamer und verfügen über erhöhte Attribute. Gesundheit regeneriert sich nicht, es erscheinen mehr Gegner, und Tränke sowie Gegenstände sind weniger wirksam."

[insanity_button_difficulty_very_hard]
string="Sehr Schwer"

[insanity_desc_difficulty_very_hard]
string="Eine anspruchsvolle Herausforderung für erfahrene Spieler. Gegner verursachen stark erhöhten Schaden, sind noch aufmerksamer und verfügen über deutlich gesteigerte Attribute. Gesundheit regeneriert sich nicht, es treten noch mehr Gegner auf, und Tränke sowie Gegenstände sind noch weniger wirksam."

[insanity_button_difficulty_insanity]
string="Wahnsinn"

[insanity_desc_difficulty_insanity]
string="Ein brutales Erlebnis für Hardcore-Spieler. Gegner verursachen extremen Schaden, verfügen über eine extrem hohe Wahrnehmung und besitzen stark gesteigerte Attribute. Gesundheit regeneriert sich nicht, die Anzahl der Gegner ist hoch, und Tränke sowie Gegenstände sind deutlich weniger wirksam."

[insanity_button_difficulty_nightmare] //secret difficulty
string="Albtraum"

[insanity_desc_difficulty_nightmare]
string="Überleben ist nicht garantiert, und die Welt selbst verwandelt sich in einen Albtraum. Feinde fügen tödlichen Schaden zu, verfügen über geschärfte Sinne, bewegen sich schneller und besitzen wahnsinnige Attribute. Gesundheit regeneriert sich nicht, die Übermacht der Feinde ist erdrückend und Tränke sowie Gegenstände sind weitaus weniger wirksam."

