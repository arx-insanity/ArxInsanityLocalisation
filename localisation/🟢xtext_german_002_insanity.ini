// Character creation

[insanity_button_normal_start]
string="Normale Startpunkte"

[insanity_desc_normal_start]
string="Startpunkte aktiviert. Du kannst das Spiel nun beginnen, ohne einen detaillierten Charakter zu erstellen. Weise nur die Punkte zu, die du möchtest, oder gar keine. Alle ungenutzten Punkte können zu einem späteren Zeitpunkt verteilt werden."

[insanity_button_hardcore_start]
string="Keine Startpunkte"

[insanity_desc_hardcore_start]
string="Startpunkte deaktiviert. Zu Spielbeginn können keine Punkte vergeben werden. Anschließend verläuft der Fortschritt wie gewohnt, Attributs- und Fertigkeitspunkte werden beim Stufenaufstieg erworben."

[insanity_suffix_immersive_mode_on]
string=" : Aktiviert"

[insanity_suffix_immersive_mode_off]
string=" : Deaktiviert"

[insanity_button_immersive_mode] //immersive mode button
string="Immersiver Modus (Minimales HUD)"

[insanity_desc_immersive_mode]
string="Minimale HUD-Elemente sorgen für einen aufgeräumteren Bildschirm und ein immersiveres Erlebnis. Lediglich essenzielle Symbole bleiben sichtbar, wie etwa Inventare, Bücher und Symbole für Levelübergänge. Der Immersive Modus kann jederzeit im Optionsmenü (Gameplay-Einstellungen) geändert werden."

