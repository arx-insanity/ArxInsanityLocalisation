// Character creation

[insanity_button_normal_start]
string="Domyślne Punkty Startowe"

[insanity_desc_normal_start]
string="Punkty startowe włączone. Możesz zacząć grę bez tworzenia szczegółowej konfiguracji postaci. Przydziel tylko te punkty, które chcesz, albo nie przydzielaj żadnych. Wszystkie niewykorzystane punkty możesz rozdać później."

[insanity_button_hardcore_start]
string="Brak Punktów Startowych"

[insanity_desc_hardcore_start]
string="Punkty startowe wyłączone. Na początku gry nie można przydzielić żadnych punktów startowych, ponieważ zostaną one zresetowane. Następnie rozwój postaci przebiega normalnie, a punkty atrybutów i umiejętności są zdobywane wraz z awansowaniem na kolejne poziomy."

[insanity_suffix_immersive_mode_on]
string=" : Włączony"

[insanity_suffix_immersive_mode_off]
string=" : Wyłączony"

[insanity_button_immersive_mode] //immersive mode button
string="Tryb Immersyjny (minimalny interfejs)"

[insanity_desc_immersive_mode]
string="Minimalne elementy interfejsu zapewniają czystszy ekran i bardziej immersyjne doświadczenie. Widoczne pozostają tylko podstawowe ikony, takie jak ekwipunek, księgi oraz ikony przejścia do kolejnego poziomu. Tryb immersyjny można w dowolnym momencie włączyć lub wyłączyć w menu opcji (ustawienia rozgrywki)."

