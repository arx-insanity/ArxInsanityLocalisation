//ARX INSANITY POLISH 0.6.0

//Translation by Spoke

//May 2026 update: All main menu descriptions have been capitalized in order to match Arx Insanity's new visual style and interface.

[insanity_choose_difficulty]
string="Wybierz pozion trudności:"

[insanity_button_difficulty_easy]
string="Łatwy"

[insanity_desc_difficulty_easy]
string="Przygodowe doświadczenie dla nowych graczy. Obrażenia i statystyki wrogów są zmniejszone. Regeneracja zdrowia jest włączona, a mikstury i przedmioty są bardzo skuteczne."

[insanity_button_difficulty_normal]
string="Normalny"

[insanity_desc_difficulty_normal]
string="Zrównoważone doświadczenie dla większości graczy. Wrogowie zadają standardowe obrażenia, są czujni i posiadają zbalansowane statystyki. Regeneracja zdrowia jest wyłączona, pojawia się więcej przeciwników, a mikstury i przedmioty zachowują swoją normalną skuteczność."

[insanity_button_difficulty_hard]
string="Trudny"

[insanity_desc_difficulty_hard]
string="Zwiększone wyzwanie dla doświadczonych graczy. Wrogowie zadają większe obrażenia, są bardziej czujni i posiadają podwyższone statystyki. Regeneracja zdrowia jest wyłączona, pojawia się więcej przeciwników, a mikstury i przedmioty są mniej skuteczne."

[insanity_button_difficulty_very_hard]
string="Bardzo Trudny"

[insanity_desc_difficulty_very_hard]
string="Wymagające wyzwanie dla weteranów. Wrogowie zadają znacznie większe obrażenia, są jeszcze bardziej czujni i posiadają znacznie podwyższone statystyki. Regeneracja zdrowia jest wyłączona, pojawia się jeszcze więcej przeciwników, a mikstury i przedmioty są jeszcze mniej skuteczne."

[insanity_button_difficulty_insanity]
string="Szaleństwo"

[insanity_desc_difficulty_insanity]
string="Brutalne doświadczenie dla hardkorowych graczy. Wrogowie zadają ekstremalne obrażenia, posiadają wyostrzoną percepcję i mają znacznie zwiększone statystyki. Regeneracja zdrowia jest wyłączona, pojawiają się ogromne ilości przeciwników, a mikstury i przedmioty są znacząco mniej skuteczne."

[insanity_button_difficulty_nightmare] //secret difficulty
string="Koszmar"

[insanity_desc_difficulty_nightmare]
string="Przetrwanie jest kluczowe, a sam świat staje się koszmarem. Wrogowie zadają śmiercionośne obrażenia, posiadają wyostrzoną percepcję, poruszają się szybciej i mają absurdalnie wysokie statystyki. Regeneracja zdrowia jest wyłączona, liczba przeciwników jest przytłaczająca, a mikstury i przedmioty są skrajnie mało skuteczne."

