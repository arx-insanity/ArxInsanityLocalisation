// Character creation

[insanity_button_normal_start]
string="Pontos iniciais predefinidos"

[insanity_desc_normal_start]
string="Pontos inicias ativados. Podes agora começar o jogo sem criar uma personagem detalhada. Atribui apenas os pontos que pretendas, ou simplesmente nenhum. Quaisquer pontos não utilizados serão distribuídos mais tarde."

[insanity_button_hardcore_start]
string="Sem pontos iniciais"

[insanity_desc_hardcore_start]
string="Pontos iniciais desativados. No início do jogo não podem ser atribuídos pontos iniciais, pois serão reiniciados. Mais tarde, a progressão continua normalmente, atributos e pontos de habilidade são ganhos ao subir de nível."

[insanity_suffix_immersive_mode_on]
string=" : Ativado"

[insanity_suffix_immersive_mode_off]
string=" : Desativado"

[insanity_button_immersive_mode] //immersive mode button
string="Modo imersivo (HUD minimalista)"

[insanity_desc_immersive_mode]
string="Elementos de HUD minimos fornecem um ecrã mais limpo e uma experiência mais imersiva. Somente ícones essenciais permanecem visíveis, tal como inventários, livros e ícones de transição entre níveis. A ativação/desativação do modo imersivo pode ser alternada em qualquer altura no menu de opções (Definições de Jogabilidade)."

