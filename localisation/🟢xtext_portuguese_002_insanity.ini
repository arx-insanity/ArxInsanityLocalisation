//ARX INSANITY PORTUGUESE (PT) 0.6.0

//Translation by joaoppecurto

//May 2026 update: All main menu descriptions have been capitalized in order to match Arx Insanity's new visual style and interface.

[insanity_choose_difficulty]
string="Seleção do nível de dificuldade:"

[insanity_button_difficulty_easy]
string="Fácil"

[insanity_desc_difficulty_easy]
string="Experiência casual, indicada para novos jogadores. O dano do inimigo e os seus atributos são reduzidos. A regeneração de saúde está ativada e poções/items são altamente eficazes."

[insanity_button_difficulty_normal]
string="Normal"

[insanity_desc_difficulty_normal]
string="Experiência equilibrada para a maioria dos jogadores. Os inimigos causam dano normal, possuem uma percepção equilibrada e têm atributos equilibrados. A regeneração de saúde está desativada, aparecem mais inimigos e poções/items mantêm a sua eficácia normal."

[insanity_button_difficulty_hard]
string="Difícil"

[insanity_desc_difficulty_hard]
string="Mais desafiante, indicado para jogadores experientes. Inimigos infligem dano acrescido, possuem uma maior percepção e têm atributos acrescidos. A regeneração de saúde está desativada, existe maior presença de inimigos e poções/items têm menor eficácia."

[insanity_button_difficulty_very_hard]
string="Muito Difícil"

[insanity_desc_difficulty_very_hard]
string="Desafio exigente para jogadores veteranos. Inimigos infligem dano altamente acrescido, possuem uma percepção ainda maior e têm atributos altamente acrescidos. A regeneração de saúde está desativada, existe ainda maior presença inimiga e poções/items têm ainda menor eficácia."

[insanity_button_difficulty_insanity]
string="Insanidade"

[insanity_desc_difficulty_insanity]
string="Experiência brutal, para jogadores hardcore. Inimigos infligem dano extremo, possuem percepção aumentada, e têm atributos enormemente acrescidos. A regeneração de saúde está desativada, existe enorme presença inimiga e poções/items têm significativamente menor eficácia."

[insanity_button_difficulty_nightmare] //secret difficulty
string="Pesadelo"

[insanity_desc_difficulty_nightmare]
string="Aqui a sobrevivência é essencial e o próprio mundo torna-se um pesadelo. Inimigos infligem dano mortal, possuem percepção aumentada, movem-se mais rápido, e têm atributos absurdos. A regeneração de saúde está desativada, o número de inimigos é avassalador e poções/items têm extremamente menor eficácia."

