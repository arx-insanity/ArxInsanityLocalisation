//ARX INSANITY RUSSIAN 0.6.0

//Translation by PegasDoggeAM

//May 2026 update: All main menu descriptions have been capitalized in order to match Arx Insanity's new visual style and interface.

[insanity_choose_difficulty]
string="Выберите уровень сложности:"

[insanity_button_difficulty_easy]
string="Лёгкий"

[insanity_desc_difficulty_easy]
string="Непринуждённый опыт для новых игроков. Урон и характеристики врагов снижены. Включена регенерация здоровья, а зелья и предметы очень эффективны."

[insanity_button_difficulty_normal]
string="Нормальный"

[insanity_desc_difficulty_normal]
string="Сбалансированный опыт для большинства игроков. Враги наносят обычный урон, проницательны и обладают сбалансированными характеристиками. Регенерация здоровья отключена, появляется больше врагов, а зелья и предметы сохраняют свою обычную эффективность."

[insanity_button_difficulty_hard]
string="Сложный"

[insanity_desc_difficulty_hard]
string="Усложнённое испытание для опытных игроков. Враги наносят больший урон, более внимательны и обладают улучшенными характеристиками. Регенерация здоровья отключена, появляется больше врагов, а зелья и предметы менее эффективны."

[insanity_button_difficulty_very_hard]
string="Очень сложный"

[insanity_desc_difficulty_very_hard]
string="Непростое испытание для опытных игроков. Враги наносят значительный урон, стали ещё более проницательными и обладают существенно улучшенными характеристиками. Регенерация здоровья отключена, ещё больше врагов, а зелья и предметы ещё менее эффективны."

[insanity_button_difficulty_insanity]
string="Безумие"

[insanity_desc_difficulty_insanity]
string="Жестокий опыт для хардкорных игроков. Враги наносят огромный урон, обладают повышенной внимательностью и значительно улучшенными характеристиками. Регенерация здоровья отключена, огромное количество врагов, а зелья и предметы существенно менее эффективны."

[insanity_button_difficulty_nightmare] //secret difficulty
string="Кошмар"

[insanity_desc_difficulty_nightmare]
string="Выживание — это всё, а сам мир превращается в кошмар. Враги наносят смертельный урон, обладают повышенной внимательностью, двигаются быстрее и имеют невероятные характеристики. Регенерация здоровья отключена, количество врагов подавляющее, а зелья и предметы крайне неэффективны."

