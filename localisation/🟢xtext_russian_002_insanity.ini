// Character creation

[insanity_button_normal_start]
string="Стартовые очки умений по умолчанию"

[insanity_desc_normal_start]
string="Стартовые очки умений включены. Теперь вы можете начать игру, не создавая подробную сборку персонажа. Распределите только нужные вам очки или не распределяйте их вовсе. Неиспользованные очки можно распределить позже."

[insanity_button_hardcore_start]
string="Нет стартовых очков умений"

[insanity_desc_hardcore_start]
string="Стартовые очки умений выключены. В начале игры очки нельзя присвоить, так как они будут сброшены. После этого прогресс продолжается, как обычно, а очки характеристик и навыков начисляются при повышения уровня."

[insanity_suffix_immersive_mode_on]
string=" : Включен"

[insanity_suffix_immersive_mode_off]
string=" : Выключен"

[insanity_button_immersive_mode] //immersive mode button
string="Иммерсивный режим (минимум элементов HUD)"

[insanity_desc_immersive_mode]
string="Минималистичный HUD обеспечивает более чистый экран и захватывающий игровой процесс. Видны только основные значки, такие как инвентарь, книги и значки перехода между уровнями. Иммерсивный режим можно включить в любое время в меню настроек (настройки игрового процесса)."

